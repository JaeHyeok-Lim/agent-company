<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>agent-company · floor view</title>
  <link rel="stylesheet" href="/dashboard/styles.css" />
</head>
<body data-view="cards">
  <header>
    <h1><span class="logo">🏢</span> agent-company</h1>
    <p class="sub">the multi-agent team — live floor view</p>
    <div class="controls">
      <button id="viewToggle" class="toggle" type="button">🎬 Office view</button>
      <button id="simToggle" class="toggle sim" type="button">▶ Simulate handoffs</button>
      <span id="updated" class="updated">loading…</span>
    </div>
  </header>
  <main>
    <section id="grid" class="grid"></section>
    <section id="office" class="office"></section>
  </main>
  <footer>
    <span class="legend"><span class="dot idle"></span> idle / dozing</span>
    <span class="legend"><span class="dot working"></span> working</span>
    <span class="legend"><span class="dot done"></span> done</span>
    <span class="hint">status driven by Claude Code hooks → <code>.claude/state/agents.json</code></span>
  </footer>
  <script type="module" src="/dashboard/app.js"></script>
</body>
</html>
